<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#00ff9d" opacity="0.1"/>
  <circle cx="100" cy="100" r="90" fill="none" stroke="#00ff9d" stroke-width="3"/>
  
  <!-- Central synth waveform -->
  <path d="M 40 100 L 60 70 L 80 130 L 100 50 L 120 150 L 140 80 L 160 120" 
        fill="none" stroke="#00ff9d" stroke-width="4" stroke-linecap="round"/>
  
  <!-- CLSK Text -->
  <text x="100" y="170" font-family="Arial, sans-serif" font-size="36" font-weight="bold" 
        fill="#00ff9d" text-anchor="middle">CLSK</text>
  
  <!-- Mining pickaxe icon (small) -->
  <g transform="translate(160, 40)">
    <path d="M 0 0 L 15 -15 L 20 -10 L 5 5 Z" fill="#00ff9d"/>
    <rect x="3" y="5" width="4" height="20" fill="#00ff9d" transform="rotate(45 5 5)"/>
  </g>
  
  <!-- Coin sparkles -->
  <circle cx="35" cy="45" r="3" fill="#00ff9d" opacity="0.8"/>
  <circle cx="165" cy="155" r="3" fill="#00ff9d" opacity="0.8"/>
  <circle cx="45" cy="155" r="2" fill="#00ff9d" opacity="0.6"/>
</svg>
